name: Release

on:
  pull_request:
    types:
      - closed
    branches:
      - master

jobs:
  pre-release:
    name: Release
    runs-on: "ubuntu-latest"

    steps:
      - name: "Build & test"
        run: |
          echo done!

      - uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: "latest"
          prerelease: true
          title: "Development Build"
          files: |
            LICENSE.txt
            *.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
