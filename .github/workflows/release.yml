name: Create Release

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latestname: Create Release

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: 18

      # Add step to verify the existence of package.json
      - name: Verify package.json
        run: '[ -e package.json ] || (echo "Error: package.json not found" && exit 1)'

      - name: Run Semantic Release
        run: npx semantic-release  

      - name: Set Release Name
        id: set_release_name
        run: echo "::set-output name=release_name::v1.0.0"

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.set_release_name.outputs.release_name }}
          release_name: ${{ steps.set_release_name.outputs.release_name }}
          body: |
            Changes in this Release
            - First Change
            - Second Change
          draft: false
          prerelease: false


